<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — keb.is</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e8e0d0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap { padding: 2rem; }
    h1 {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 700;
      line-height: 1;
      color: #c8773a;
      letter-spacing: -0.04em;
    }
    p {
      margin-top: 1rem;
      font-size: 1.125rem;
      color: #a09880;
    }
    a {
      display: inline-block;
      margin-top: 2rem;
      color: #e8e0d0;
      text-decoration: none;
      border-bottom: 1px solid #c8773a;
      padding-bottom: 2px;
      font-size: 0.9375rem;
      transition: color 0.15s;
    }
    a:hover { color: #c8773a; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>Síðan finnst ekki.</p>
    <a href="/">Til baka á forsíðu</a>
  </div>
</body>
</html>
