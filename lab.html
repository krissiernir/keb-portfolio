<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab — Kristján Ernir</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
    }

    /* Back link — top-left */
    .nav-back {
      position: fixed;
      top: 1.5rem;
      left: 1.75rem;
      z-index: 10;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: rgba(223, 223, 223, 0.45);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .nav-back:hover { color: rgba(232, 133, 44, 0.85); }

    /* Name + caption - lower-left */
    .hero-text {
      position: fixed;
      bottom: 2.5rem;
      left: 1.75rem;
      z-index: 10;
      pointer-events: none;
    }

    .hero-name {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(1.75rem, 4vw, 3rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #f3e3c8;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    .hero-caption {
      margin-top: 0.55rem;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: rgba(232, 133, 44, 0.65);
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Reduced-motion: skip animations */
    @media (prefers-reduced-motion: reduce) {
      .hero-name, .hero-caption {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }

    /* Static frame overlay for reduced-motion (applied via JS) */
    body.static-mode canvas {
      /* canvas rendered once, rAF stopped */
    }
  </style>
</head>
<body>

  <a class="nav-back" href="index.html">&#8592; til baka</a>

  <div class="hero-text">
    <div class="hero-name">kristján ernir</div>
    <div class="hero-caption">tilraun - particle hero</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ── Performance detection ──────────────────────────────────────────────────
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const lowEnd = window.innerWidth < 768 || (navigator.hardwareConcurrency || 8) <= 4;
  const PARTICLE_COUNT = lowEnd ? 6000 : 16000;

  // ── Scene ──────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0a);

  const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 0.4, 4.2);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.055;
  controls.enablePan = false;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.28;
  controls.minDistance = 2.0;
  controls.maxDistance = 8.0;

  // ── Hash noise (from reference, adapted) ──────────────────────────────────
  function noise3D(x, y, z, t) {
    const sx = Math.sin(x * 1.7 + t)       * Math.cos(z * 2.3 + t * 0.7);
    const sy = Math.sin(y * 2.1 + t * 0.8) * Math.cos(x * 1.9 + t * 0.5);
    const sz = Math.sin(z * 1.5 + t * 1.1) * Math.cos(y * 2.7 + t * 0.3);
    return { x: sx, y: sy, z: sz };
  }

  // ── Torus-knot point generation ───────────────────────────────────────────
  // P=2 Q=3 torus knot — a single continuous loop, visually striking
  function generateTorusKnotPoints(count, p, q, R, r) {
    const positions = new Float32Array(count * 3);
    const basePos   = new Float32Array(count * 3);
    const normals   = new Float32Array(count * 3);
    const sizes     = new Float32Array(count);
    const phases    = new Float32Array(count);
    const colors    = new Float32Array(count * 3);

    // Orange → cream palette
    const colorA = new THREE.Color(0xe8852c); // warm orange
    const colorB = new THREE.Color(0xf3e3c8); // cream

    for (let i = 0; i < count; i++) {
      // Parametric torus-knot: t in [0, 2π]
      const t = (i / count) * Math.PI * 2;
      const phi = (q / p) * t;

      const cx = (R + r * Math.cos(phi)) * Math.cos(t);
      const cy = (R + r * Math.cos(phi)) * Math.sin(t);
      const cz = r * Math.sin(phi);

      // Add a small random scatter around the curve for volume
      const scatter = 0.08 + Math.random() * 0.14;
      const rx = (Math.random() - 0.5) * scatter;
      const ry = (Math.random() - 0.5) * scatter;
      const rz = (Math.random() - 0.5) * scatter;

      const px = cx + rx;
      const py = cy + ry;
      const pz = cz + rz;

      positions[i * 3]     = px;
      positions[i * 3 + 1] = py;
      positions[i * 3 + 2] = pz;
      basePos[i * 3]       = px;
      basePos[i * 3 + 1]   = py;
      basePos[i * 3 + 2]   = pz;

      // Outward normal approximation (from tube center)
      const nx = rx, ny = ry, nz = rz;
      const nl = Math.sqrt(nx*nx + ny*ny + nz*nz) || 1;
      normals[i * 3]     = nx / nl;
      normals[i * 3 + 1] = ny / nl;
      normals[i * 3 + 2] = nz / nl;

      // Per-particle size variation
      sizes[i] = 0.007 + Math.random() * 0.022;

      // Random phase for noise offset
      phases[i] = Math.random() * Math.PI * 2;

      // Color: blend by height (y) mapped 0→1 — lower = orange, upper = cream
      // y ranges roughly from -r to +r when phi sweeps
      const blend = (py + r) / (2 * r);
      const c = colorA.clone().lerp(colorB, Math.max(0, Math.min(1, blend)));
      colors[i * 3]     = c.r;
      colors[i * 3 + 1] = c.g;
      colors[i * 3 + 2] = c.b;
    }

    return { positions, basePos, normals, sizes, phases, colors };
  }

  const { positions, basePos, normals, sizes, phases, colors } =
    generateTorusKnotPoints(PARTICLE_COUNT, 2, 3, 1.0, 0.42);

  // ── Particle texture ───────────────────────────────────────────────────────
  function makeParticleTex() {
    const sz = 64;
    const c = document.createElement('canvas');
    c.width = c.height = sz;
    const ctx = c.getContext('2d');
    const grad = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz/2);
    grad.addColorStop(0,   'rgba(255,255,255,1)');
    grad.addColorStop(0.5, 'rgba(255,255,255,0.9)');
    grad.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, sz, sz);
    const tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
  }

  // ── Build BufferGeometry ───────────────────────────────────────────────────
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aColor',   new THREE.BufferAttribute(colors, 3));

  // ── ShaderMaterial (adapted from reference) ────────────────────────────────
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTexture:    { value: makeParticleTex() },
      uPixelRatio: { value: renderer.getPixelRatio() },
      uTime:       { value: 0 },
    },
    vertexShader: /* glsl */`
      attribute float aSize;
      attribute vec3  aColor;
      uniform   float uPixelRatio;
      varying   vec3  vColor;
      varying   float vAlpha;

      void main() {
        vColor = aColor;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_Position  = projectionMatrix * mv;
        gl_PointSize = aSize * uPixelRatio * (320.0 / -mv.z);
        // Fade particles that drift far from center for a soft edge
        float dist = length(position);
        vAlpha = smoothstep(2.5, 1.2, dist);
      }
    `,
    fragmentShader: /* glsl */`
      uniform sampler2D uTexture;
      varying vec3  vColor;
      varying float vAlpha;

      void main() {
        vec4 tex = texture2D(uTexture, gl_PointCoord);
        if (tex.a < 0.05) discard;
        gl_FragColor = vec4(vColor, tex.a * vAlpha);
      }
    `,
    transparent: true,
    depthWrite:  false,
    blending:    THREE.AdditiveBlending,
  });

  const points = new THREE.Points(geo, mat);
  scene.add(points);

  // ── Subtle ambient glow (large soft orange sphere) ─────────────────────────
  // A very dim additive sprite at the center adds warmth
  const glowGeo = new THREE.SphereGeometry(1.1, 8, 8);
  const glowMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(0xe8852c),
    transparent: true,
    opacity: 0.03,
    side: THREE.FrontSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  scene.add(new THREE.Mesh(glowGeo, glowMat));

  // ── Animation ──────────────────────────────────────────────────────────────
  const NOISE_SPEED     = 0.18;
  const NOISE_AMPLITUDE = 0.018;
  const clock = new THREE.Clock();
  const posAttr = geo.attributes.position;
  let rafId;

  function animate() {
    rafId = requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    mat.uniforms.uTime.value = t;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const bx = basePos[i * 3];
      const by = basePos[i * 3 + 1];
      const bz = basePos[i * 3 + 2];
      const nx = normals[i * 3];
      const ny = normals[i * 3 + 1];
      const nz = normals[i * 3 + 2];
      const phase = phases[i];

      const n = noise3D(bx * 2.8, by * 2.8, bz * 2.8, t * NOISE_SPEED + phase);

      // Tangent-plane projection (remove normal component)
      const dot = n.x*nx + n.y*ny + n.z*nz;
      const dx = (n.x - dot*nx) * NOISE_AMPLITUDE;
      const dy = (n.y - dot*ny) * NOISE_AMPLITUDE;
      const dz = (n.z - dot*nz) * NOISE_AMPLITUDE;

      // Breathing along normal
      const breathe = Math.sin(t * 0.45 + phase) * NOISE_AMPLITUDE * 0.25;

      posAttr.setXYZ(
        i,
        bx + dx + nx * breathe,
        by + dy + ny * breathe,
        bz + dz + nz * breathe,
      );
    }

    posAttr.needsUpdate = true;
    controls.update();
    renderer.render(scene, camera);
  }

  // ── Reduced-motion guard ───────────────────────────────────────────────────
  if (reducedMotion) {
    document.body.classList.add('static-mode');
    controls.autoRotate = false;
    // Render exactly one frame, then stop
    controls.update();
    renderer.render(scene, camera);
  } else {
    animate();
  }

  // ── Mouse parallax (subtle tilt, only on non-touch) ───────────────────────
  let mouseX = 0, mouseY = 0;
  if (!reducedMotion && window.matchMedia('(pointer: fine)').matches) {
    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / innerWidth  - 0.5) * 2;
      mouseY = (e.clientY / innerHeight - 0.5) * 2;
    });
    // Apply as gentle rotation offset each frame via autoRotate + manual nudge
    const origUpdate = controls.update.bind(controls);
    controls.update = function() {
      origUpdate();
      // Shift camera target slightly toward mouse
      const targetX = mouseX * 0.12;
      const targetY = -mouseY * 0.08;
      camera.position.x += (targetX - camera.position.x) * 0.04;
      camera.position.y += (targetY + 0.4 - camera.position.y) * 0.04;
    };
  }

  // ── Resize handler ─────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    mat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
    // Re-render static frame if in reduced-motion mode
    if (reducedMotion) renderer.render(scene, camera);
  });

  // ── Cleanup on page hide ───────────────────────────────────────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      cancelAnimationFrame(rafId);
    } else if (!reducedMotion) {
      clock.getDelta(); // flush elapsed time gap
      animate();
    }
  });
  </script>
</body>
</html>
